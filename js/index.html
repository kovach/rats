<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Datalog Evaluator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; height: 100vh; display: flex; flex-direction: column; }
    header { padding: 8px 16px; background: #1e293b; color: white; font-size: 14px; font-weight: bold; flex-shrink: 0; }
    #main { display: flex; flex: 1; overflow: hidden; }
    #left { display: flex; flex-direction: column; width: 40%; border-right: 2px solid #e2e8f0; }
    #editor { flex: 1; width: 100%; resize: none; font-family: monospace; font-size: 13px;
              border: none; padding: 12px; outline: none; line-height: 1.6; }
    #run-btn { padding: 10px; background: #2563eb; color: white; border: none;
               cursor: pointer; font-size: 13px; font-family: monospace; flex-shrink: 0; }
    #run-btn:hover { background: #1d4ed8; }
    #right { flex: 1; overflow-y: auto; padding: 12px; background: #f8fafc; }
    .entry { margin-bottom: 12px; padding: 10px 12px; background: white;
             border-radius: 4px; border-left: 4px solid #94a3b8; font-size: 12px; }
    .entry.init   { border-color: #16a34a; }
    .entry.up     { border-color: #dc2626; }
    .entry.down   { border-color: #2563eb; }
    .entry.result { border-color: #9333ea; }
    .entry-title { font-weight: bold; font-size: 13px; margin-bottom: 6px; }
    .label { color: #64748b; font-size: 10px; text-transform: uppercase;
             letter-spacing: 0.05em; margin-top: 6px; margin-bottom: 2px; }
    .tuples, .db { color: #334155; line-height: 1.6; }
    .none { color: #94a3b8; }
    .error { color: #dc2626; padding: 12px; font-size: 13px; }
  </style>
</head>
<body>
  <header>Datalog Evaluator</header>
  <div id="main">
    <div id="left">
      <textarea id="editor" spellcheck="false">edge a b
edge b c
edge c d
path X Y <- edge X Y
path X Z <- path X Y, edge Y Z</textarea>
      <button id="run-btn" onclick="run()">&#9654; Run</button>
    </div>
    <div id="right"></div>
  </div>
<script type="module">
import { splitRules, prettyAtom } from './parse-rule.js';
import { makeEvalFn } from './eval-fn.js';
import { solveWithLog, tupleKey } from './eval.js';

// ── rendering ─────────────────────────────────────────────────────────────────

function renderD(D) {
  const active = [];
  for (const [key, count] of D) {
    if (count > 0) active.push(JSON.parse(key));
  }
  active.sort((a, b) => tupleKey(a).localeCompare(tupleKey(b)));
  if (active.length === 0) return '<span class="none">(empty)</span>';
  return active.map(t => prettyAtom(t)).join('<br>');
}

function renderTuples(ts) {
  if (ts.length === 0) return '<span class="none">(none)</span>';
  return ts.map(t => prettyAtom(t)).join(', ');
}

function renderLog(log) {
  return [...log].reverse().map(entry => {
    if (entry.type === 'init') {
      return `<div class="entry init">
        <div class="entry-title">Initialization</div>
        <div class="label">Fresh (including facts)</div>
        <div class="tuples">${renderTuples(entry.fresh)}</div>
        <div class="label">Database</div>
        <div class="db">${renderD(entry.D)}</div>
      </div>`;
    } else {
      const cls = entry.inputDir === 'up' ? 'up' : 'down';
      return `<div class="entry ${cls}">
        <div class="entry-title">Step ${entry.stepNum} &nbsp;${entry.inputDir.toUpperCase()} &rarr; ${entry.outputDir.toUpperCase()}</div>
        <div class="label">Output trajectory</div>
        <div class="tuples">${renderTuples(entry.fresh)}</div>
        <div class="label">Database</div>
        <div class="db">${renderD(entry.D)}</div>
      </div>`;
    }
  }).join('');
}

function run() {
  const text = document.getElementById('editor').value;
  const output = document.getElementById('right');
  try {
    const { facts, rules } = splitRules(text);
    const { log, result } = solveWithLog(facts, rules, makeEvalFn(rules));
    output.innerHTML = `<div class="entry result">
      <div class="entry-title">Result</div>
      <div class="db">${renderD(result)}</div>
    </div>` + renderLog(log);
  } catch (e) {
    output.innerHTML = `<div class="error">Error: ${e.message}</div>`;
  }
}

document.getElementById('editor').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); run(); }
});

run();
</script>
</body>
</html>
