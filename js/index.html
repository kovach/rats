<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>DERP: deriving predicates</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; height: 100vh; display: flex; flex-direction: column; }

    /* ── light (default) ── */
    :root {
      --bg:        #ffffff;
      --bg-panel:  #f8fafc;
      --bg-entry:  #ffffff;
      --bg-header: var(--bg-panel);
      --border:    #e2e8f0;
      --text:      #334155;
      --text-dim:  #64748b;
      --text-none: #94a3b8;
      --traj-up:   #f0fdf4;
      --traj-down: #fef2f2;
    }
    /* ── dark ── */
    body.dark { color-scheme: dark;
      --bg:        #0f172a;
      --bg-panel:  #1e293b;
      --bg-entry:  #1e293b;
      --bg-header: #1e293b;
      --border:    #334155;
      --text:      #cbd5e1;
      --text-dim:  #94a3b8;
      --text-none: #475569;
      --traj-up:   #14532d44;
      --traj-down: #7f1d1d44;
    }

    header { padding: 8px 16px; background: var(--bg-header); color: var(--text); font-size: 14px; font-weight: bold; flex-shrink: 0;
             display: flex; align-items: center; justify-content: space-between; }
    #dark-toggle, #help-btn { background: none; border: 1px solid var(--text-dim); color: var(--text-dim); border-radius: 4px;
                   padding: 2px 8px; cursor: pointer; font-size: 12px; font-family: monospace; }
    #dark-toggle:hover, #help-btn:hover { border-color: white; color: white; }
    #main { display: flex; flex: 1; overflow: hidden; }
    #left { display: flex; flex-direction: column; width: 40%; border-right: 2px solid var(--border); }
    #editor { flex: 1; width: 100%; resize: none; font-family: monospace; font-size: 12px;
              border: none; padding: 12px; outline: none; line-height: 1.6;
              background: var(--bg); color: var(--text); }
    .btn-row { display: flex; flex-shrink: 0; background: var(--bg); }
    #run-btn, #run-ref-btn { flex: 1; padding: 10px; color: white; border: none;
               cursor: pointer; font-size: 13px; font-family: monospace; }
    #run-btn { background: #2563eb; }
    #run-btn:hover { background: #1d4ed8; }
    #run-ref-btn { background: #c2410c; }
    #run-ref-btn:hover { background: #9a3412; }
    #trace-label { display: flex; align-items: center; gap: 5px; padding: 0 10px;
                   font-size: 12px; color: var(--text-dim); white-space: nowrap; }
    #right { flex: 1; overflow-y: auto; padding: 12px; background: var(--bg-panel); }
    .entry { margin-bottom: 12px; padding: 10px 12px; background: var(--bg-entry);
             border-radius: 4px; border-left: 4px solid #94a3b8; font-size: 12px; }
    .entry.init   { border-color: #16a34a; }
    .entry.up     { border-color: #dc2626; }
    .entry.down   { border-color: #2563eb; }
    .entry.result { border-color: #9333ea; }
    .entry.ref-result { border-color: #ea580c; }
    .entry.ref-step  { border-color: #f97316; }
    .entry-title { font-weight: bold; font-size: 13px; margin-bottom: 6px; color: var(--text); }
    .label { color: var(--text-dim); font-size: 10px; margin-top: 6px; margin-bottom: 2px; }
    .tuples, .db { color: var(--text); line-height: 1.6; padding-top: 2px; }
    .db { border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; margin-top: 4px; }
    .traj-up   { background: var(--traj-up);   border-radius: 3px; padding: 3px 6px; }
    .traj-down { background: var(--traj-down);  border-radius: 3px; padding: 3px 6px; }
    .error { color: #dc2626; padding: 12px; font-size: 13px; }
    .cutoff-badge { display: inline-block; margin-left: 8px; padding: 1px 6px;
                    background: #f59e0b; color: white; border-radius: 3px; font-size: 10px; }
    details { margin-top: 4px; }
    summary.label { cursor: pointer; user-select: none; list-style: none; display: flex; align-items: center; gap: 5px; }
    summary.label::before { content: '▶'; font-size: 8px; color: var(--text-none); }
    details[open] > summary.label::before { content: '▼'; }
  </style>

  <script language="javascript" src="client-deps/lz-string.min.js"></script>

</head>
<body class="dark">
  <header><span>DERP: deriving predicates</span><div style="display:flex;gap:8px"><button id="help-btn">help</button><button id="dark-toggle">light</button></div></header>
  <div id="main">
    <div id="left">
      <textarea id="editor" spellcheck="false">
edge A B
-------------
path A B 1 B.

edge A B, path B C N _, #add 1 N M
----------------------------------
path A C M B.

path A B M _, path A B N _, #lt M N
-----------------------------------
better-path A B N.

path A B N NextNode, !better-path A B N
---------------------------------------
best-path A B N NextNode.

; a -> x -> c
; a -> y -> c
; a -> c
edge a x. edge x c.
edge a y. edge y c.
edge a c.

; -- HELP --
; Keybindings
; - Ctrl+Enter   run
; - Ctrl+S       update URL with current program
; - Ctrl+/       comment/uncomment selected lines
; - Ctrl+X       cut current line
;
; Syntax
; An atom is a predicate followed by terms.
;   - predicates lowercase   foo, edge
;   - variables upper case   X, Foo
;   - compound terms         cons(V1, cons(V2, nil))
;
; - Rules are written as:
;   - `head X <- body X.`
;   - `body X -> head X.`
;   - `body X --(-...) head X.`
;   - `head.`.
</textarea>
      <div class="btn-row">
        <button id="run-btn">&#9654; Run</button>
        <button id="run-ref-btn">&#9654; Run (ref)</button>
        <label id="trace-label"><input type="checkbox" id="trace-cb"> trace</label>
      </div>
    </div>
    <div id="right"></div>
  </div>
<script type="module">
import { parseRules, prettyAtom } from './parse-rule.js';
import { compileDerivatives, makeHelpers, makeCompiledRefEvalFn, makeNegOnlyFn } from './eval-fn.js';
import { solveWithLog, solveRefWithLog } from './eval.js';
import { tupleKey } from './util.js';

// ── config ────────────────────────────────────────────────────────────────────
const DB_FOLD_THRESHOLD = 10;    // collapse a relation if it has this many or more tuples
const MAX_INNER_ITERS  = 300;   // max iterations of the inner (positive) fixpoint per step
const MAX_OUTER_STEPS  = 10;    // max steps of the alternating fixpoint

// ── rendering ─────────────────────────────────────────────────────────────────

// inline=true: items on one line separated by commas
// inline=false: items on separate lines
// open=true: expanded by default
function renderCollapsible(label, items, { inline = false, open = true, contentClass = '' } = {}) {
  const empty = items.length === 0;
  const content = empty
    ? `<span class="none">(none)</span>`
    : inline ? items.join(', ') : items.join('<br>');
  const cls = [inline ? 'tuples' : 'db', contentClass].filter(Boolean).join(' ');
  return `<details${open ? ' open' : ''}>
      <summary class="label">${label}</summary>
      <div class="${cls}">${content}</div>
    </details>`;
}

function activeTuples(D) {
  if (typeof D.activeTuples === 'function') return D.activeTuples();
  const ts = [];
  for (const [key, e] of D) if ((e.current ?? e.count) > 0) ts.push([JSON.parse(key), e.current ?? e.count]);
  ts.sort(([a], [b]) => tupleKey(a).localeCompare(tupleKey(b)));
  return ts;
}

function renderDb(D, { open = false, label = 'Database' } = {}) {
  const tuples = activeTuples(D);
  const inner = tuples.length === 0
    ? `<div class="db">(none)</div>`
    : [...Map.groupBy(tuples, ([t]) => t.name).entries()].map(([name, ts]) => {
        const relOpen = ts.length < DB_FOLD_THRESHOLD;
        const content = ts.map(([t, count]) =>
          count === 1 ? prettyAtom(t) : `${prettyAtom(t)} <span style="color:#94a3b8">(×${count})</span>`
        ).join('<br>');
        return `<details${relOpen ? ' open' : ''}>
          <summary class="label">${name} (${ts.length})</summary>
          <div class="db">${content}</div>
        </details>`;
      }).join('');
  return `<details${open ? ' open' : ''}>
    <summary class="label">${label} (${tuples.length})</summary>
    ${inner}
  </details>`;
}

function renderTrace(trace) {
  if (!trace || trace.length === 0) return '';
  const rows = trace.map(({ sign, tuple, produced }) => {
    const producedStr = produced.length === 0
      ? '<span class="none">(empty)</span>'
      : produced.map(u => prettyAtom(u)).join(', ');
    return `<div><span style="color:#64748b">${sign === 'neg' ? '−' : '+'}</span> <b>${prettyAtom(tuple)}</b> → ${producedStr}</div>`;
  });
  return renderCollapsible('Trace', rows, { inline: false, open: false });
}

function renderLog(log) {
  return [...log].reverse().map(entry => {
    const badge = entry.cutoff ? `<span class="cutoff-badge">CUTOFF</span>` : '';
    if (entry.type === 'init') {
      return `<div class="entry init">
        <div class="entry-title">Initialization${badge}</div>
        ${renderCollapsible('Seeds', entry.seeds.map(prettyAtom), { inline: true, open: true, contentClass: 'traj-up' })}
        <details>
          <summary class="label">Details</summary>
          ${renderDb(entry.D, { open: true })}
        </details>
      </div>`;
    } else {
      const dirName = entry.direction === 1 ? 'UP' : 'DOWN';
      const cls = entry.direction === 1 ? 'up' : 'down';
      const trajClass = entry.direction === 1 ? 'traj-up' : 'traj-down';
      const beforeDb = entry.D_before ? renderDb(entry.D_before, { open: false }) : '';
      return `<div class="entry ${cls}">
        <div class="entry-title">Step ${entry.stepNum} ${dirName}${badge}</div>
        ${renderCollapsible('Output diff', entry.changes.map(prettyAtom), { inline: true, open: true, contentClass: trajClass })}
        <details>
          <summary class="label">Details</summary>
          ${renderTrace(entry.trace)}
          ${entry.D_before ? renderDb(entry.D_before, { open: false, label: 'Database before' }) : ''}
          ${renderDb(entry.D, { open: entry.cutoff, label: 'Database after' })}
        </details>
      </div>`;
    }
  }).join('');
}

function renderRefLog(log) {
  return [...log].reverse().map(entry => {
    const badge = entry.cutoff ? `<span class="cutoff-badge">CUTOFF</span>` : '';
    return `<div class="entry ref-step">
      <div class="entry-title">Ref step ${entry.stepNum}${badge}</div>
      ${renderDb(entry.D, { open: entry.cutoff })}
    </div>`;
  }).join('');
}

function runRef() {
  const text = document.getElementById('editor').value;
  const output = document.getElementById('right');
  try {
    const allRules = parseRules(text);
    save();
    const facts = allRules.filter(r => r.body.length === 0).flatMap(r => r.head);
    const rules = allRules.filter(r => r.body.length > 0);
    const derivatives = compileDerivatives(rules);
    const evalFnRef = makeCompiledRefEvalFn(derivatives);
    const negOnly = makeNegOnlyFn(rules);
    const { log, result, cutoff } = solveRefWithLog(facts, negOnly, evalFnRef, { maxInner: MAX_INNER_ITERS, maxOuter: MAX_OUTER_STEPS });
    const resultBadge = cutoff ? `<span class="cutoff-badge">CUTOFF</span>` : '';
    output.innerHTML = `<div class="entry ref-result">
      <div class="entry-title">Result (ref)${resultBadge}</div>
      ${renderDb(result, { open: true })}
    </div>` + renderRefLog(log);
  } catch (e) {
    output.innerHTML = `<div class="error">Error: ${e.message}</div>`;
  }
}

function run() {
  const text = document.getElementById('editor').value;
  const output = document.getElementById('right');
  try {
    const allRules = parseRules(text);
    save();
    const facts = allRules.filter(r => r.body.length === 0).flatMap(r => r.head);
    const rules = allRules.filter(r => r.body.length > 0);
    const derivatives = compileDerivatives(rules);
    const helpers = makeHelpers(derivatives, rules);
    const tracing = document.getElementById('trace-cb').checked;
    const { log, result, cutoff } = solveWithLog(facts, rules, helpers, { maxInner: MAX_INNER_ITERS, maxOuter: MAX_OUTER_STEPS, tracing });
    const resultBadge = cutoff ? `<span class="cutoff-badge">CUTOFF</span>` : '';
    output.innerHTML = `<div class="entry result">
      <div class="entry-title">Result${resultBadge}</div>
      ${renderDb(result, { open: true })}
    </div>` + renderLog(log);
  } catch (e) {
    output.innerHTML = `<div class="error">Error: ${e.message}</div>`;
  }
}

const USE_WEBSOCKET = false;

// WebSocket sync — optional (gracefully absent when opened without server)
const ws = USE_WEBSOCKET ? (() => { try { return new WebSocket(`ws://${location.host}`); } catch { return null; } })() : null;

function save() {
  const editorValue = document.getElementById('editor').value;
  if (ws?.readyState === WebSocket.OPEN)
    ws.send(editorValue);
  const str = LZString.compressToBase64(editorValue);
  location.hash = 'code/' + str;
}

if (ws) {
  ws.addEventListener('message', e => {
    document.getElementById('editor').value = e.data;
    run();
  });
}

document.getElementById('editor').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); run(); }
  if (e.key === 's' && e.ctrlKey) { e.preventDefault(); save(); }
  if (e.key === '/' && e.ctrlKey) {
    e.preventDefault();
    const ta = e.target;
    const val = ta.value;
    const { selectionStart: ss, selectionEnd: se } = ta;
    const lineStart = val.lastIndexOf('\n', ss - 1) + 1;
    const selEndAdj = se > ss && val[se - 1] === '\n' ? se - 1 : se;
    const blockEnd = (() => { const i = val.indexOf('\n', selEndAdj); return i === -1 ? val.length : i; })();
    const lines = val.slice(lineStart, blockEnd).split('\n');
    ta.setSelectionRange(lineStart, blockEnd);
    document.execCommand('insertText', false, lines.map(l => '; ' + l).join('\n'));
    ta.setSelectionRange(ss + 2, se + 2 * lines.length);
  }
  if (e.key === 'x' && e.ctrlKey && e.target.selectionStart === e.target.selectionEnd) {
    e.preventDefault();
    const ta = e.target;
    const val = ta.value;
    const lineStart = val.lastIndexOf('\n', ta.selectionStart - 1) + 1;
    const end = val.indexOf('\n', ta.selectionStart);
    const isLastLine = end === -1;
    const lineEnd = isLastLine ? val.length : end + 1;
    // When cutting the last line, also remove the preceding newline so the
    // cursor lands at the end of the previous line rather than an empty tail.
    const deleteStart = (isLastLine && lineStart > 0) ? lineStart - 1 : lineStart;
    navigator.clipboard.writeText(val.slice(lineStart, lineEnd));
    ta.setSelectionRange(deleteStart, lineEnd);
    // https://developer.mozilla.org/en-US/docs/Web/API/Document/execCommand
    document.execCommand('insertText', false, '');
    ta.selectionStart = ta.selectionEnd = deleteStart;
  }
});

document.getElementById('run-btn').addEventListener('click', run);
document.getElementById('run-ref-btn').addEventListener('click', runRef);

const HELP_TEXT = `
; ── keybindings ──────────────────────────────
; Ctrl+Enter   run
; Ctrl+S       update URL with current program
; Ctrl+/       comment/uncomment selected lines
; Ctrl+X       cut current line
`.trimStart();

document.getElementById('help-btn').addEventListener('click', () => {
  const ta = document.getElementById('editor');
  ta.focus();
  ta.setSelectionRange(ta.value.trimEnd().length, ta.value.length);
  document.execCommand('insertText', false, '\n\n' + HELP_TEXT);
});

const darkToggle = document.getElementById('dark-toggle');
darkToggle.addEventListener('click', () => {
  const dark = document.body.classList.toggle('dark');
  darkToggle.textContent = dark ? 'light' : 'dark';
});

const hash = location.hash.startsWith('#code/') ? location.hash.slice(6) : null;
if (hash) document.getElementById('editor').value = LZString.decompressFromBase64(hash);

run();
document.getElementById('editor').focus();
</script>
</body>
</html>
